version: 2
updates:
  # Root package dependencies
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "!/@plotly/*"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 14
    groups:
      npm-dependencies:
        applies-to: version-updates
        patterns:
          - "*"
      npm-dependencies-security:
        applies-to: security-updates
        patterns:
          - "*"

  # Dash renderer
  - package-ecosystem: "npm"
    directory: "/dash/dash-renderer"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 14
    groups:
      npm-dependencies:
        applies-to: version-updates
        patterns:
          - "*"
      npm-dependencies-security:
        applies-to: security-updates
        patterns:
          - "*"
    allow:
      - dependency-name: "@types/*"
      - dependency-name: "@babel/*"
      - dependency-name: "babel-loader"
      - dependency-name: "ts-loader"
      - dependency-name: "cookie"
      - dependency-name: "webpack*"
      - dependency-name: "typescript"

  # Components - dash-core-components
  - package-ecosystem: "npm"
    directory: "/components/dash-core-components"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 14
    groups:
      npm-dependencies:
        applies-to: version-updates
        patterns:
          - "*"
      npm-dependencies-security:
        applies-to: security-updates
        patterns:
          - "*"
    # Only auto-update these packages for version updates
    allow:
      - dependency-name: "date-fns"
      - dependency-name: "file-saver"
      - dependency-name: "ramda"
      - dependency-name: "react-window"
      - dependency-name: "@radix-ui/*"
      - dependency-name: "@types/*"
      - dependency-name: "@babel/*"
      - dependency-name: "babel-loader"
      - dependency-name: "webpack*"
      - dependency-name: "typescript"
    # react-docgen is pinned for legacy metadata extraction (extract-meta.js uses
    # the react-docgen 5 API) and must never be updated.
    ignore:
      - dependency-name: "react-docgen"

  # Components - dash-html-components
  - package-ecosystem: "npm"
    directory: "/components/dash-html-components"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 14
    groups:
      npm-dependencies:
        applies-to: version-updates
        patterns:
          - "*"
      npm-dependencies-security:
        applies-to: security-updates
        patterns:
          - "*"
    allow:
      - dependency-name: "@types/*"
      - dependency-name: "@babel/*"
      - dependency-name: "babel-loader"
      - dependency-name: "webpack*"
      - dependency-name: "typescript"
    # react-docgen is pinned for legacy metadata extraction (extract-meta.js uses
    # the react-docgen 5 API) and must never be updated.
    ignore:
      - dependency-name: "react-docgen"

  # Components - dash-table
  - package-ecosystem: "npm"
    directory: "/components/dash-table"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 14
    groups:
      npm-dependencies:
        applies-to: version-updates
        patterns:
          - "*"
      npm-dependencies-security:
        applies-to: security-updates
        patterns:
          - "*"
    allow:
      - dependency-name: "@types/*"
      - dependency-name: "@babel/*"
      - dependency-name: "babel-loader"
      - dependency-name: "ts-loader"
      - dependency-name: "css-loader"
      - dependency-name: "less"
      - dependency-name: "less-loader"
      - dependency-name: "webpack*"
      - dependency-name: "typescript"
    # react-docgen is pinned for legacy metadata extraction (extract-meta.js uses
    # the react-docgen 5 API) and must never be updated.
    ignore:
      - dependency-name: "react-docgen"

  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 14
    groups:
      pip-dependencies:
        applies-to: version-updates
        patterns:
          - "*"
      pip-dependencies-security:
        applies-to: security-updates
        patterns:
          - "*"
    # jupyterlab is pinned <4.0.0: jupyterlab 4.x ships jlpm as Yarn Berry, which
    # cannot consume @plotly/dash-jupyterlab's Yarn 1 lockfile and breaks the build.
    ignore:
      - dependency-name: "jupyterlab"
        versions: [">=4.0.0"]
