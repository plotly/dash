version: 2
updates:
  # Root package dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      npm-dependencies:
        applies-to: version-updates
        patterns:
          - "*"
        minimum-release-age: 14
      npm-dependencies-security:
        applies-to: security-updates
        patterns:
          - "*"
    ignore:
      # Ignore @plotly packages
      - dependency-name: "@plotly/*"

  # Dash renderer
  - package-ecosystem: "npm"
    directory: "/dash/dash-renderer"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      npm-dependencies:
        applies-to: version-updates
        patterns:
          - "*"
        minimum-release-age: 14
      npm-dependencies-security:
        applies-to: security-updates
        patterns:
          - "*"

  # Components - dash-core-components
  - package-ecosystem: "npm"
    directory: "/components/dash-core-components"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      npm-dependencies:
        applies-to: version-updates
        patterns:
          - "*"
        minimum-release-age: 14
      npm-dependencies-security:
        applies-to: security-updates
        patterns:
          - "*"
    # Only auto-update these packages for version updates
    allow:
      - dependency-name: "date-fns"
      - dependency-name: "file-saver"
      - dependency-name: "ramda"
      - dependency-name: "react-window"
      - dependency-name: "@radix-ui/*"
      - dependency-name: "@types/*"
      - dependency-name: "@babel/*"
      - dependency-name: "eslint*"
      - dependency-name: "webpack*"
      - dependency-name: "typescript"

  # Components - dash-html-components
  - package-ecosystem: "npm"
    directory: "/components/dash-html-components"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      npm-dependencies:
        applies-to: version-updates
        patterns:
          - "*"
        minimum-release-age: 14
      npm-dependencies-security:
        applies-to: security-updates
        patterns:
          - "*"

  # Components - dash-table
  - package-ecosystem: "npm"
    directory: "/components/dash-table"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      npm-dependencies:
        applies-to: version-updates
        patterns:
          - "*"
        minimum-release-age: 14
      npm-dependencies-security:
        applies-to: security-updates
        patterns:
          - "*"

  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      pip-dependencies:
        applies-to: version-updates
        patterns:
          - "*"
        minimum-release-age: 14
      pip-dependencies-security:
        applies-to: security-updates
        patterns:
          - "*"
